<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Whisper — Админ панель</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #0a0c10; color: #eee; font-family: monospace; padding: 20px; }
        .container { max-width: 1400px; margin: 0 auto; }
        h1 { color: #ff4757; margin-bottom: 20px; }
        .stats { background: #1e1f24; padding: 15px; border-radius: 12px; margin-bottom: 20px; display: flex; gap: 30px; flex-wrap: wrap; }
        .stat { font-size: 20px; }
        .stat span { color: #ff4757; font-weight: bold; }
        .tabs { display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; }
        .tab { padding: 10px 20px; background: #1e1f24; cursor: pointer; border-radius: 8px; transition: 0.2s; }
        .tab:hover { background: #2c2e36; }
        .tab.active { background: #ff4757; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        table { width: 100%; border-collapse: collapse; background: #14161c; border-radius: 12px; overflow: hidden; }
        th, td { padding: 10px; text-align: left; border-bottom: 1px solid #2c2e36; font-size: 13px; }
        th { background: #1e1f24; color: #ff4757; }
        button { padding: 4px 10px; margin: 2px; border: none; border-radius: 6px; cursor: pointer; font-size: 11px; transition: 0.2s; }
        .ban-btn { background: #8b3c2c; color: white; }
        .ban-btn:hover { background: #a04a38; }
        .unban-btn { background: #2a6f3f; color: white; }
        .unban-btn:hover { background: #3a8f4f; }
        .mod-btn { background: #2c5f8a; color: white; }
        .mod-btn:hover { background: #3a7faa; }
        .user-id { font-size: 10px; color: #888; font-family: monospace; word-break: break-all; }
        .search { margin-bottom: 15px; }
        .search input { width: 300px; padding: 8px; background: #1e1f24; border: 1px solid #333; color: white; border-radius: 8px; }
        .status-banned { color: #ff4757; font-weight: bold; }
        .status-active { color: #2a6f3f; }
        .mod-badge { background: #2c5f8a; padding: 2px 6px; border-radius: 12px; font-size: 10px; }
        @media (max-width: 700px) {
            body { padding: 10px; }
            table { font-size: 10px; }
            th, td { padding: 5px; }
            button { padding: 2px 6px; font-size: 9px; }
        }
    </style>
</head>
<body>
<div class="container">
    <h1>👑 WHISPER — Админ панель</h1>
    
    <div class="stats" id="stats">
        <div class="stat">📊 Загрузка...</div>
    </div>
    
    <div class="tabs">
        <div class="tab active" data-tab="users">👥 Пользователи</div>
        <div class="tab" data-tab="bots">🤖 Боты</div>
        <div class="tab" data-tab="banned">🚫 Заблокированные сообщения</div>
    </div>
    
    <div id="usersTab" class="tab-content active">
        <div class="search">
            <input type="text" id="searchUsers" placeholder="🔍 Поиск по ID или нику...">
        </div>
        <div style="overflow-x: auto;">
            <table>
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Ник</th>
                        <th>Статус</th>
                        <th>Предупреждения</th>
                        <th>Бан до</th>
                        <th>Действия</th>
                    </tr>
                </thead>
                <tbody id="userTable"></tbody>
            </table>
        </div>
    </div>
    
    <div id="botsTab" class="tab-content">
        <div style="overflow-x: auto;">
            <table>
                <thead>
                    <tr>
                        <th>ID бота</th>
                        <th>Имя</th>
                        <th>Владелец</th>
                        <th>Интервал</th>
                        <th>Сообщение</th>
                        <th>Статус</th>
                        <th>Действия</th>
                    </tr>
                </thead>
                <tbody id="botTable"></tbody>
            </table>
        </div>
    </div>
    
    <div id="bannedTab" class="tab-content">
        <div style="overflow-x: auto;">
            <table>
                <thead>
                    <tr>
                        <th>Время</th>
                        <th>Пользователь</th>
                        <th>Сообщение</th>
                        <th>Причина</th>
                        <th>Очки</th>
                    </tr>
                </thead>
                <tbody id="bannedTable"></tbody>
            </table>
        </div>
    </div>
</div>

<script src="/admin.js"></script>
</body>
</html>
